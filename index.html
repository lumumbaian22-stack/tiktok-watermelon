<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peel Master 🍉</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<video id="camera" autoplay playsinline></video>

<div id="game">

  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Level: <span id="level">1</span></span>
  </div>

  <div id="watermelon">
    <img src="https://i.imgur.com/7yUvePI.png" id="melon-img">

    <div id="peel-layer"></div>

    <div id="safe-zone"></div>
    <div id="perfect-zone"></div>

    <img src="https://i.imgur.com/2RMz9GZ.png" id="peeler">
  </div>

  <canvas id="juice"></canvas>

  <div id="feedback"></div>

</div>

<script src="app.js"></script>
</body>
</html>
